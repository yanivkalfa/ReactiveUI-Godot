[plugin]

name="Reactive UI Editor"
description="In-editor .guitkx authoring for the Godot editor: a main-screen multi-file editor with syntax highlighting, live cross-file compiler diagnostics (file + project scope), completion with snippet inserts, hover, signature help, go-to-definition, references, project-wide rename and search, document outline, find/replace, session restore, formatting via guitkx.config.json, and data-safety guards (dirty tracking, external-change detection, undo-surviving format). Depends on the 'Reactive UI' addon (addons/reactive_ui) for the .guitkx compiler/lexer/formatter."
author="ReactiveUIToolKit"
version="0.5.0"
script="plugin.gd"
