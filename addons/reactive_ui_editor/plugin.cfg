[plugin]

name="Reactive UI Editor"
description="In-editor .guitkx authoring for the Godot editor: a main-screen multi-file editor with syntax highlighting, live cross-file compiler diagnostics (file + project scope), completion with snippet inserts, hover, signature help, go-to-definition, references, project-wide rename and search, document outline, find/replace, session restore, formatting via guitkx.config.json, and data-safety guards (dirty tracking, external-change detection, undo-surviving format). With the optional 'reactive_ui_analyzer' GDExtension installed, embedded GDScript inside {expr}/setup code gains type-aware completion, hover, diagnostics, navigation, rename, and signature help (feature-detected; markup-only without it). Depends on the 'Reactive UI' addon (addons/reactive_ui) for the .guitkx compiler/lexer/formatter."
author="ReactiveUIToolKit"
version="0.6.0"
script="plugin.gd"
