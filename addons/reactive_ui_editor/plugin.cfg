[plugin]

name="Reactive UI Editor"
description="In-editor .guitkx authoring for the Godot editor: a main-screen editor with syntax highlighting, live cross-file compiler diagnostics, completion, hover, go-to-definition, find, and data-safety guards (dirty tracking, external-change detection, undo-surviving format). Depends on the 'Reactive UI' addon (addons/reactive_ui) for the .guitkx compiler/lexer/formatter."
author="ReactiveUIToolKit"
version="0.4.0"
script="plugin.gd"
