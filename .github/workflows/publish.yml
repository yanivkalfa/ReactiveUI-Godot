name: Publish

# Single manual "Publish" workflow, mirroring ReactiveUIToolKit's publish.yml: one Run-workflow
# button publishes EVERYTHING whose version changed. Each job reads its OWN version, SKIPS if the
# matching tag already exists, and tags + uploads on success -- so re-running is idempotent and a job
# only ships when its artifact was bumped:
#   - release-addon   -> Godot addon: zip addons/reactive_ui + GitHub release, gated on `v<plugin.cfg>`
#   - publish-vscode  -> VS Code extension: VS Marketplace + Open VSX, gated on `vscode-v<package.json>`
#   - publish-vs2022  -> VS 2022 extension: VsixPublisher, gated on `vs2022-v<vsixmanifest>`
#
# Secrets required (Settings > Secrets and variables > Actions):
#   VSCE_PAT             Azure DevOps PAT (Marketplace > Manage) for the VS Code Marketplace
#   OVSX_TOKEN           open-vsx.org access token
#   VS_MARKETPLACE_TOKEN Azure DevOps PAT for the Visual Studio Marketplace (VS2022)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Godot addon — zip addons/reactive_ui + GitHub release, publishes only if version changed
  # ════════════════════════════════════════════════════════════════════════════
  release-addon:
    name: Package addon + GitHub release (idempotent)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read addon version from plugin.cfg
        id: ver
        run: |
          VER=$(grep -oP '^version="\K[^"]+' addons/reactive_ui/plugin.cfg | head -1)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VER" >> "$GITHUB_OUTPUT"
          echo "Addon version: $VER"

      - name: Skip if tag already exists
        id: check
        run: |
          if git rev-parse "refs/tags/${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.ver.outputs.tag }} already exists — nothing to publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run headless tests before releasing
        if: steps.check.outputs.exists == 'false'
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.7.0"
          use-dotnet: false
          include-templates: false

      - name: Verify tests pass
        if: steps.check.outputs.exists == 'false'
        run: |
          godot --headless --path . --script res://tests/guitkx_build.gd
          godot --headless --path . --editor --quit || true
          godot --headless --path . --script res://tests/core_test.gd
          godot --headless --path . --script res://tests/style_test.gd
          godot --headless --path . --script res://tests/router_match_test.gd
          godot --headless --path . --script res://tests/router_spine_test.gd
          godot --headless --path . --script res://tests/update_test.gd
          godot --headless --path . --script res://tests/demos_test.gd
          godot --headless --path . --script res://tests/guitkx_test.gd

      - name: Package the addon (only addons/reactive_ui ships)
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p dist
          zip -r "dist/reactive_ui-${{ steps.ver.outputs.version }}.zip" addons/reactive_ui -x '*/.git*'

      - name: Create + push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Reactive UI ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: dist/reactive_ui-${{ steps.ver.outputs.version }}.zip

  # ════════════════════════════════════════════════════════════════════════════
  # VS Code extension — VS Marketplace + Open VSX, publishes only if version changed
  # ════════════════════════════════════════════════════════════════════════════
  publish-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(node -p "require('./ide-extensions/vscode/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git tag --list "vscode-v$VERSION" | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::VS Code extension v$VERSION already published — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build language server
        if: steps.check.outputs.skip == 'false'
        working-directory: ide-extensions/lsp-server
        run: npm ci && npm run build

      - name: Generate CHANGELOG.md from centralized changelog
        if: steps.check.outputs.skip == 'false'
        run: node ide-extensions/scripts/changelog.mjs extract --ide vscode --out ide-extensions/vscode/CHANGELOG.md

      - name: Install + build extension
        if: steps.check.outputs.skip == 'false'
        working-directory: ide-extensions/vscode
        run: npm ci && npm run build

      - name: Bundle server + package extension
        if: steps.check.outputs.skip == 'false'
        working-directory: ide-extensions/vscode
        run: |
          node scripts/bundle-server.js
          npx --yes @vscode/vsce package -o guitkx.vsix

      - name: Publish to VS Marketplace
        id: publish-vsce
        if: steps.check.outputs.skip == 'false'
        working-directory: ide-extensions/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath guitkx.vsix --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        id: publish-ovsx
        if: steps.check.outputs.skip == 'false'
        working-directory: ide-extensions/vscode
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: npx --yes ovsx publish guitkx.vsix -p "$OVSX_TOKEN"
        continue-on-error: true

      - name: Tag published version
        if: steps.check.outputs.skip == 'false' && steps.publish-vsce.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "vscode-v${{ steps.check.outputs.version }}"
          git push origin "vscode-v${{ steps.check.outputs.version }}"

      - name: Upload VSIX artifact
        if: steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: guitkx-vscode-${{ steps.check.outputs.version }}
          path: ide-extensions/vscode/guitkx.vsix

  # ════════════════════════════════════════════════════════════════════════════
  # Visual Studio 2022 extension — publishes only if version changed
  # ════════════════════════════════════════════════════════════════════════════
  publish-vs2022:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version already published
        id: check
        shell: pwsh
        run: |
          [xml]$manifest = Get-Content "ide-extensions/visual-studio/GuitkxVsix/source.extension.vsixmanifest"
          $version = $manifest.PackageManifest.Metadata.Identity.Version
          echo "version=$version" >> $env:GITHUB_OUTPUT
          if (git tag --list "vs2022-v$version") {
            echo "skip=true" >> $env:GITHUB_OUTPUT
            echo "::notice::VS 2022 extension v$version already published — skipping"
          } else {
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }

      - name: Setup Node.js
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build + bundle language server (+ Node runtime) into the VSIX
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: |
          Push-Location ide-extensions/lsp-server
          npm ci; npm run build
          Pop-Location
          Push-Location ide-extensions/vscode
          npm ci; node scripts/bundle-server.js
          Pop-Location
          Copy-Item -Recurse -Force ide-extensions/vscode/server ide-extensions/visual-studio/GuitkxVsix/server
          # Bundle a Node runtime so the VSIX is self-contained (no Node on the user's PATH).
          & ide-extensions/visual-studio/GuitkxVsix/fetch-node.ps1

      - name: Generate overview.md from centralized changelog
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: node ide-extensions/scripts/changelog.mjs extract-overview --ide vs2022 --template ide-extensions/visual-studio/GuitkxVsix/overview-template.md --out ide-extensions/visual-studio/GuitkxVsix/overview.md

      - name: Build VSIX
        if: steps.check.outputs.skip == 'false'
        shell: cmd
        working-directory: ide-extensions/visual-studio/GuitkxVsix
        run: |
          set "VSWHERE=C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          for /f "usebackq tokens=*" %%i in (`"%VSWHERE%" -latest -prerelease -products * -requires Microsoft.Component.MSBuild -property installationPath`) do set "VSINSTALL=%%i"
          if not defined VSINSTALL echo ERROR: No Visual Studio with MSBuild found via vswhere & exit /b 1
          echo Using Visual Studio at "%VSINSTALL%"
          call "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" -no_logo
          msbuild GuitkxVsix.csproj -t:Restore -p:Configuration=Release -v:minimal
          msbuild GuitkxVsix.csproj -t:Build -p:Configuration=Release -p:DeployExtension=false -v:minimal
          msbuild GuitkxVsix.csproj -t:CreateVsixContainer -p:Configuration=Release -p:DeployExtension=false -v:minimal

      - name: Verify VSIX contains the language server
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        working-directory: ide-extensions/visual-studio/GuitkxVsix
        run: |
          $vsix = Get-ChildItem -Recurse -Filter "*.vsix" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $vsix) { Write-Error "No VSIX found after build"; exit 1 }
          $zip = $vsix.FullName -replace '\.vsix$', '.zip'
          $tmp = Join-Path $env:TEMP 'vsix-verify'
          try {
            Copy-Item $vsix.FullName $zip -Force
            if (Test-Path $tmp) { Remove-Item $tmp -Recurse -Force }
            Expand-Archive $zip $tmp -Force
            $server = Get-ChildItem $tmp -Recurse -Filter "server.js" | Where-Object { $_.Directory.Name -eq 'server' }
            if (-not $server) {
              Write-Host "::error::VSIX is missing server/server.js! Contents:"
              Get-ChildItem $tmp -Recurse | ForEach-Object { Write-Host $_.FullName }
              exit 1
            }
            $node = Get-ChildItem $tmp -Recurse -Filter "node.exe" | Where-Object { $_.Directory.Name -eq 'server' }
            if (-not $node) {
              Write-Host "::error::VSIX is missing the bundled server/node.exe (fetch-node.ps1 did not run or the download failed)."
              exit 1
            }
            Write-Host "Verified: VSIX contains $($server.FullName) + bundled node.exe ($([math]::Round($node.Length/1MB,1)) MB)"
          } finally {
            Remove-Item $zip -Force -ErrorAction SilentlyContinue
            Remove-Item $tmp -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Locate VSIX
        if: steps.check.outputs.skip == 'false'
        id: find_vsix
        shell: pwsh
        working-directory: ide-extensions/visual-studio/GuitkxVsix
        run: |
          $candidates = @("bin\Release\GuitkxVsix.vsix", "bin\Release\net472\GuitkxVsix.vsix", "GuitkxVsix.vsix")
          $found = $null
          foreach ($c in $candidates) { if (Test-Path $c) { $found = (Resolve-Path $c).Path; break } }
          if (-not $found) {
            $vsix = Get-ChildItem -Recurse -Filter "*.vsix" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($vsix) { $found = $vsix.FullName }
          }
          if (-not $found) { Write-Host "::error::No .vsix found"; Get-ChildItem -Recurse bin | Format-Table FullName; exit 1 }
          Write-Host "Found VSIX: $found"
          echo "VSIX_PATH=$found" >> $env:GITHUB_OUTPUT

      - name: Publish to VS Marketplace
        id: publish
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        working-directory: ide-extensions/visual-studio/GuitkxVsix
        env:
          MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}
        run: |
          $pub = Get-ChildItem -Path "$env:USERPROFILE\.nuget\packages\microsoft.vssdk.buildtools" -Recurse -Filter "VsixPublisher.exe" |
                 Where-Object { $_.DirectoryName -match 'tools[\\/]vssdk[\\/]bin$' } |
                 Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $pub) { Write-Host "::error::VsixPublisher.exe not found in NuGet cache"; exit 1 }
          $output = & $pub.FullName publish `
            -payload "${{ steps.find_vsix.outputs.VSIX_PATH }}" `
            -publishManifest publishManifest.json `
            -personalAccessToken $env:MARKETPLACE_TOKEN 2>&1 | Out-String
          $exitCode = $LASTEXITCODE
          Write-Host $output
          if ($output -match 'Uploaded') {
            Write-Host "Marketplace upload confirmed"
            $global:LASTEXITCODE = 0; exit 0   # VsixPublisher can crash on telemetry shutdown after a successful upload
          } elseif ($exitCode -ne 0) {
            Write-Host "::error::VsixPublisher failed (exit $exitCode) with no upload confirmation"; exit $exitCode
          } else {
            Write-Host "::warning::VsixPublisher exited cleanly but no upload confirmation found"
          }

      - name: Tag published version
        if: steps.check.outputs.skip == 'false' && steps.publish.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "vs2022-v${{ steps.check.outputs.version }}"
          git push origin "vs2022-v${{ steps.check.outputs.version }}"

      - name: Upload VSIX artifact
        if: steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: guitkx-vs2022-${{ steps.check.outputs.version }}
          path: ${{ steps.find_vsix.outputs.VSIX_PATH }}
