name: IDE Extensions

# Builds + tests the .guitkx tooling: changelog.json/CHANGELOG.md drift, the TypeScript language
# server (unit tests + an end-to-end stdio LSP smoke test), and the VS Code extension (type-check +
# server bundle). The VS2022 extension needs the VS SDK and is built on Windows with the VS
# toolchain, so it is not part of this matrix.
#
# changelog-sync guards the exact failure mode that shipped GUITKX 0.6.0-0.8.4: the generated
# CHANGELOG.md files (vscode, vs2022, and the Godot editor addon since its 0.6.3 cutover) must be
# regenerated from ide-extensions/changelog.json and committed together with it — nothing stops
# someone from hand-editing a CHANGELOG.md (or adding a changelog.json entry without regenerating)
# in between publishes, and nothing did, which is exactly how changelog.json silently fell 14
# versions behind. This job fails loudly, with a diff, on every push/PR instead.

on:
  push:
    branches: [master, dev]
    paths:
      [
        "ide-extensions/**",
        "addons/reactive_ui_editor/CHANGELOG.md",
        ".github/workflows/ide-extensions.yml",
      ]
  # No `paths:` filter on PRs: these jobs are *required* status checks, so they must
  # always report a conclusion — otherwise a PR that doesn't touch ide-extensions/ (e.g.
  # docs or issue templates) can never satisfy them and is permanently un-mergeable.
  pull_request:
    branches: [master, dev]

permissions:
  contents: read

jobs:
  changelog-sync:
    name: Changelog (changelog.json in sync with generated CHANGELOG.md files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify vscode / visual-studio / editor-addon CHANGELOG.md match changelog.json
        run: node ide-extensions/scripts/changelog.mjs verify

  language-server:
    name: Language server (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ide-extensions/lsp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - name: Unit tests (scanner / source map / virtual doc / context routing)
        run: node --test out/test/*.test.js
      - name: End-to-end LSP smoke test (stdio handshake + markup completion)
        run: node scripts/smoke.js

  vscode-extension:
    name: VS Code extension (build + package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build language server
        working-directory: ide-extensions/lsp-server
        run: npm ci && npm run build
      - name: Build extension
        working-directory: ide-extensions/vscode
        run: npm ci && npm run build
      - name: Bundle server + package .vsix
        working-directory: ide-extensions/vscode
        run: |
          node scripts/bundle-server.js
          npx --yes @vscode/vsce package --no-dependencies --out guitkx.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: guitkx-vsix
          path: ide-extensions/vscode/guitkx.vsix
