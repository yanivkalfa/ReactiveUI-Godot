name: Tests

# Parity with ReactiveUIToolkit's test.yml: run the test suites on every push/PR.
# Here "tests" = the headless GDScript suites (Godot has no compile step), driven exactly
# like the local loop: build the class cache once, then run each tests/*.gd script (each
# quits with a non-zero code on failure, so the step fails).

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

permissions:
  contents: read

env:
  # CI targets the version the project is verified on (matches local dev). The library still parses on
  # 4.1+ (FoldableContainer is is_class()/string-guarded, so it degrades gracefully below 4.5), but we
  # test on the current stable.
  GODOT_VERSION: "4.7.0"

jobs:
  # Engine-free gates run without Godot so they stay green even when engine CI is unavailable.
  gates:
    name: engine-free gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: family-corpus hash gate (A4/TD-009 mirror tripwire)
        # Verifies the mirrored family scanner corpus (familyCore tiers) still hashes to the
        # value pinned in plans/family-corpus.hash — i.e. it has not drifted from the Unreal/Unity
        # siblings. Re-pin with `node scripts/corpus-hash.mjs --write` after an intentional change.
        run: node scripts/corpus-hash.mjs --check

  headless-tests:
    name: Headless GDScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Godot ${{ env.GODOT_VERSION }} (headless)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: false

      - name: Compile .guitkx -> sibling .gd (generated output is git-ignored)
        run: godot --headless --path . --script res://tests/guitkx_build.gd

      - name: Contract goldens are fresh (GD half of the GD<->TS grammar parity harness)
        run: godot --headless --path . --script res://tests/contract_dump.gd -- --check

      - name: Build class cache (editor import scan)
        run: godot --headless --path . --editor --quit || true

      - name: Core reconciler / hooks tests
        run: godot --headless --path . --script res://tests/core_test.gd

      - name: Style + elements tests
        run: godot --headless --path . --script res://tests/style_test.gd

      - name: Router foundation tests (path / match / ranker)
        run: godot --headless --path . --script res://tests/router_match_test.gd

      - name: Router spine tests (routes / outlet / nav / blockers)
        run: godot --headless --path . --script res://tests/router_spine_test.gd

      - name: Reconciler update / diff tests
        run: godot --headless --path . --script res://tests/update_test.gd

      - name: Demo smoke tests
        run: godot --headless --path . --script res://tests/demos_test.gd

      - name: GUITKX compiler tests (.guitkx -> .gd + codegen mechanism)
        run: godot --headless --path . --script res://tests/guitkx_test.gd

      - name: Fast Refresh tests (runtime HMR — in-place reload + targeted re-render)
        run: godot --headless --path . --script res://tests/hmr_test.gd

      - name: Editor markup-intelligence tests (lsp/ modules — context/schema/workspace/completion/hover)
        run: godot --headless --path . --script res://tests/guitkx_lsp_test.gd

      - name: Editor addon tests (substrate, data safety, goto-def, find bar, deps handshake, schema sync)
        run: godot --headless --path . --script res://tests/guitkx_editor_test.gd
