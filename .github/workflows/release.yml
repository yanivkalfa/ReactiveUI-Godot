name: Release

# Parity with ReactiveUIToolkit's publish.yml model: MANUAL dispatch, version read from a
# version file, SKIP-IF-TAG-ALREADY-EXISTS, package + release, then AUTO-TAG on success.
#
# Godot adaptation: the shippable artifact is the self-contained `addons/reactive_ui/` folder
# (examples/tests/research are NOT shipped). We zip it, cut a GitHub release, and tag. The
# Godot Asset Library submission is a one-time manual step pointing at this repo + the tag
# (AssetLib pulls a specific commit/tag — no registry push needed).

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-addon:
    name: Package addon + GitHub release (idempotent)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read addon version from plugin.cfg
        id: ver
        run: |
          VER=$(grep -oP '^version="\K[^"]+' addons/reactive_ui/plugin.cfg | head -1)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VER" >> "$GITHUB_OUTPUT"
          echo "Addon version: $VER"

      - name: Skip if tag already exists
        id: check
        run: |
          if git rev-parse "refs/tags/${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.ver.outputs.tag }} already exists — nothing to publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run headless tests before releasing
        if: steps.check.outputs.exists == 'false'
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.4.1"
          use-dotnet: false
          include-templates: false

      - name: Verify tests pass
        if: steps.check.outputs.exists == 'false'
        run: |
          godot --headless --path . --editor --quit || true
          godot --headless --path . --script res://tests/core_test.gd
          godot --headless --path . --script res://tests/style_test.gd
          godot --headless --path . --script res://tests/router_match_test.gd
          godot --headless --path . --script res://tests/router_spine_test.gd
          godot --headless --path . --script res://tests/update_test.gd
          godot --headless --path . --script res://tests/demos_test.gd
          godot --headless --path . --script res://tests/guitkx_test.gd

      - name: Package the addon (only addons/reactive_ui ships)
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p dist
          zip -r "dist/reactive_ui-${{ steps.ver.outputs.version }}.zip" addons/reactive_ui -x '*/.git*'

      - name: Create + push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Reactive UI ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: dist/reactive_ui-${{ steps.ver.outputs.version }}.zip
