name: Bug Report
description: Report a bug in ReactiveUI for Godot or the GUITKX language tooling
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - Runtime (rendering, hooks, reconciler)
        - Router
        - GUITKX Language (compiler, markup, formatter)
        - VS Code Extension
        - Visual Studio 2022 Extension
        - LSP Server (completions, hover, diagnostics)
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "Addon version or extension version"
      placeholder: "e.g. reactive_ui addon 0.x / vscode guitkx 0.2.4"
    validations:
      required: true

  - type: input
    id: godot-version
    attributes:
      label: Godot Version
      placeholder: "e.g. 4.7.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps or a .guitkx snippet to reproduce the issue
      placeholder: |
        1. Create a .guitkx file with this content:
        ```
        component Example():
          <VBoxContainer>
            <Label text="hi" />
          </VBoxContainer>
        ```
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Output / Logs
      description: "Paste any error messages, compiler output, or LSP logs (VS Code: set `guitkx.trace.server` to `verbose`)"
      render: text

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
